# ============================================
# CordovaBuilder Admin Python - Docker Compose 配置
# ============================================
version: '3.8'

services:
  # API + Web 服务（一体化部署）
  app-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cordovabuilder-python-admin
    ports:
      - "80:80"  # Nginx 端口，同时提供前端和 API
      - "3000:3000"  # FastAPI 直接访问（调试用）
    environment:
      # 覆盖 .env 中的配置（可选）
      - PORT=3000
      - LOGURU_LEVEL=INFO
    volumes:
      # 挂载工作区目录（持久化构建产物）
      - ./workspace:/workspace
      # - ./server:/app 
      # 挂载下载目录（避免重复下载）
      - ./downloads/node:/tmp/node-install
      - ./downloads/java:/tmp/java-install
      - ./downloads/gradle:/tmp/gradle-install
      - ./downloads/cmdline:/tmp/cmdline-tools-install
    restart: unless-stopped
    networks:
      - cordovabuilder-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  cordovabuilder-network:
    driver: bridge

volumes:
  workspace:
    driver: local
  downloads:
    driver: local
